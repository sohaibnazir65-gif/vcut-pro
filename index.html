<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCUT PRO - Professional Video Editor</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header */
        .header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #2c2c2e; }
        .pro-badge { background: linear-gradient(135deg, #a855f7, #3b82f6); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .logo-text { font-size: 1.3rem; font-weight: 800; color: #3b82f6; }

        /* Main Scroll Area */
        .main-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        /* Hero Actions */
        .hero-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
        .action-card { background: #1c1c1e; border-radius: 16px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; border: 1px solid #2c2c2e; }
        .action-card.new-video { background: #e3f2fd; color: #000; }
        .action-icon { font-size: 24px; }

        /* Tools Grid */
        .tools-section { padding: 10px 16px; }
        .section-title { font-size: 14px; color: #888; margin-bottom: 15px; }
        .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .tool-icon { width: 50px; height: 50px; background: #1c1c1e; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 5px; }
        .tool-name { font-size: 10px; color: #aaa; }

        /* Editor Panel */
        #editorPanel { display: none; flex-direction: column; width: 100%; }
        .video-preview { width: 100%; aspect-ratio: 16/9; background: #111; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Filters */
        .filter-row { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #0f0f0f; border-top: 1px solid #222; }
        .filter-chip { background: #222; padding: 8px 15px; border-radius: 20px; font-size: 12px; white-space: nowrap; }

        /* Timeline */
        .timeline { padding: 20px; background: #000; }
        .range-container { position: relative; height: 40px; margin-top: 10px; }
        input[type="range"] { position: absolute; width: 100%; pointer-events: none; -webkit-appearance: none; background: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; pointer-events: auto; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; border: 2px solid #fff; }

        /* Export Button */
        .export-btn { position: fixed; bottom: 85px; left: 15px; right: 15px; background: #3b82f6; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; z-index: 100; display: none; }
        
        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 0.5px solid #2c2c2e; }
        .nav-item { color: #666; font-size: 10px; text-align: center; }
        .nav-item.active { color: #3b82f6; }

        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">Processing Video...</div>

<div class="header">
    <div class="pro-badge">⚡ PRO</div>
    <div class="logo-text">VCUT PRO</div>
    <div>⚙️</div>
</div>

<div class="main-container">
    <div id="homeView">
        <div class="hero-actions">
            <div class="action-card new-video" onclick="document.getElementById('fileInput').click()">
                <div class="action-icon">✚</div>
                <div class="action-title">New video</div>
            </div>
            <div class="action-card">
                <div class="action-icon">🖼️</div>
                <div class="action-title">Edit photo</div>
            </div>
        </div>

        <div class="tools-section">
            <div class="section-title">AI & Professional Tools</div>
            <div class="tools-grid">
                <div class="tool-item"><div class="tool-icon">🤖</div><div class="tool-name">AI Cut</div></div>
                <div class="tool-item"><div class="tool-icon">✨</div><div class="tool-name">Retouch</div></div>
                <div class="tool-item"><div class="tool-icon">🌍</div><div class="tool-name">Translate</div></div>
                <div class="tool-item"><div class="tool-icon">🧹</div><div class="tool-name">Remove BG</div></div>
            </div>
        </div>
    </div>

    <div id="editorPanel">
        <div class="video-preview">
            <video id="player" playsinline></video>
        </div>
        <div class="filter-row">
            <div class="filter-chip" onclick="applyFilter('none')">Original</div>
            <div class="filter-chip" onclick="applyFilter('grayscale(100%)')">B&W</div>
            <div class="filter-chip" onclick="applyFilter('sepia(80%)')">Vintage</div>
            <div class="filter-chip" onclick="applyFilter('brightness(1.3)')">Vivid</div>
        </div>
        <div class="timeline">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: #888;">
                <span>Start: <b id="sTime">0</b>s</span>
                <span>End: <b id="eTime">0</b>s</span>
            </div>
            <div class="range-container">
                <input type="range" id="tStart" min="0" value="0" step="0.1">
                <input type="range" id="tEnd" min="0" value="10" step="0.1">
            </div>
        </div>
    </div>
</div>

<button id="exportBtn" class="export-btn" onclick="handleExport()">EXPORT & SAVE VIDEO</button>

<div class="bottom-nav">
    <div class="nav-item active">✂️<br>Edit</div>
    <div class="nav-item">🎞️<br>Templates</div>
    <div class="nav-item">📁<br>Projects</div>
    <div class="nav-item">👤<br>Me</div>
</div>

<input type="file" id="fileInput" hidden accept="video/*">

<script>
    const { FFmpeg } = window.FFmpeg;
    const { fetchFile } = window.FFmpegUtil;
    let ffmpeg = null;

    const player = document.getElementById('player');
    const tStart = document.getElementById('tStart');
    const tEnd = document.getElementById('tEnd');
    const exportBtn = document.getElementById('exportBtn');
    const loader = document.getElementById('loader');

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        player.src = URL.createObjectURL(file);
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('editorPanel').style.display = 'flex';
        exportBtn.style.display = 'block';
        
        player.onloadedmetadata = () => {
            tStart.max = player.duration;
            tEnd.max = player.duration;
            tEnd.value = player.duration;
            document.getElementById('eTime').innerText = player.duration.toFixed(1);
        };
    };

    function applyFilter(f) { player.style.filter = f; }

    tStart.oninput = () => { document.getElementById('sTime').innerText = parseFloat(tStart.value).toFixed(1); player.currentTime = tStart.value; };
    tEnd.oninput = () => { document.getElementById('eTime').innerText = parseFloat(tEnd.value).toFixed(1); player.currentTime = tEnd.value; };

    async function handleExport() {
        loader.style.display = 'flex';
        if (!ffmpeg) {
            ffmpeg = new FFmpeg();
            await ffmpeg.load({
                coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
                wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
            });
        }

        const file = document.getElementById('fileInput').files[0];
        await ffmpeg.writeFile('input.mp4', await fetchFile(file));
        
        const duration = tEnd.value - tStart.value;
        // Simple trim command
        await ffmpeg.exec(['-ss', `${tStart.value}`, '-i', 'input.mp4', '-t', `${duration}`, '-c', 'copy', 'output.mp4']);
        
        const data = await ffmpeg.readFile('output.mp4');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'VCUT_PRO_Video.mp4';
        a.click();
        
        loader.style.display = 'none';
        alert("Video Saved Successfully!");
    }
</script>

</body>
    </html>
